<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roy VAN MIL — Auteur</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,500&family=EB+Garamond:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --noir:#161210;
    --bois-fonce:#3a2a1c;
    --bois:#5a4029;
    --bois-clair:#7a5834;
    --laiton:#c9a25e;
    --laiton-clair:#e6c98a;
    --creme:#e8dcc4;
    --creme-doux:#c8b895;
    --ombre:rgba(0,0,0,.55);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    font-family:'EB Garamond',Georgia,serif;
    background:
      radial-gradient(ellipse at 50% 0%, #241a12 0%, var(--noir) 70%),
      var(--noir);
    color:var(--creme);
    min-height:100vh;
    overflow-x:hidden;
  }

  /* ---- lueur de bougie ambiante ---- */
  body::before{
    content:"";
    position:fixed;inset:0;
    background:radial-gradient(circle at 50% 40%, rgba(201,162,94,.10), transparent 55%);
    pointer-events:none;z-index:0;
  }

  header{
    text-align:center;
    padding:3.2rem 1.2rem 1.4rem;
    position:relative;z-index:2;
  }
  .eyebrow{
    font-family:'Cormorant Garamond',serif;
    font-weight:700;
    letter-spacing:.34em;
    text-transform:uppercase;
    font-size:clamp(1.2rem,4vw,1.8rem);
    color:var(--laiton-clair);
    margin-bottom:.6rem;
    padding-left:.34em;
    text-shadow:0 1px 8px rgba(0,0,0,.6);
  }
  h1{
    font-family:'Cormorant Garamond',serif;
    font-weight:600;
    font-size:clamp(2.6rem,8vw,5rem);
    line-height:.95;
    color:var(--creme);
    text-shadow:0 2px 18px rgba(0,0,0,.6);
  }
  .sous-titre{
    font-style:italic;
    font-size:clamp(1rem,3.4vw,1.3rem);
    color:var(--creme-doux);
    margin-top:1rem;
    max-width:34ch;
    margin-left:auto;margin-right:auto;
  }
  .portrait{
    display:block;
    width:clamp(150px,34vw,220px);
    margin:1.6rem auto 0;
    border-radius:4px;
    filter:drop-shadow(0 12px 24px rgba(0,0,0,.6));
  }

  /* ---- l'armoire ---- */
  .armoire-zone{
    position:relative;z-index:2;
    display:flex;justify-content:center;
    padding:1.5rem 1rem 4rem;
  }
  .armoire{
    width:min(680px,94vw);
    background:
      repeating-linear-gradient(90deg,
        var(--bois) 0px, var(--bois) 3px,
        var(--bois-clair) 3px, var(--bois-clair) 6px,
        var(--bois-fonce) 6px, var(--bois-fonce) 11px);
    border:14px solid var(--bois-fonce);
    border-radius:14px 14px 8px 8px;
    box-shadow:
      0 0 0 3px #2a1d12,
      0 30px 60px -12px rgba(0,0,0,.8),
      inset 0 0 60px rgba(0,0,0,.6);
    padding:26px 20px 30px;
  }
  .fronton{
    text-align:center;
    font-family:'Cormorant Garamond',serif;
    letter-spacing:.3em;
    text-transform:uppercase;
    font-size:.8rem;
    color:var(--laiton-clair);
    padding:.3rem 0 1.1rem;
    text-shadow:0 1px 2px #000;
  }
  .etagere{
    background:
      linear-gradient(180deg, rgba(0,0,0,.35), transparent 30%),
      repeating-linear-gradient(90deg,
        var(--bois-clair) 0px, var(--bois-clair) 4px,
        var(--bois) 4px, var(--bois) 9px);
    border-radius:6px;
    box-shadow:inset 0 -14px 22px -10px rgba(0,0,0,.85), 0 6px 0 -2px #2a1d12;
    padding:1.4rem 1rem .55rem;
    display:flex;
    justify-content:center;
    gap:clamp(.8rem,3.5vw,1.8rem);
    flex-wrap:wrap;
  }

  /* ---- les livres ---- */
  .livre{
    position:relative;
    width:clamp(120px,26vw,168px);
    aspect-ratio:2/3;
    border:none;
    cursor:pointer;
    background:linear-gradient(145deg,#4a3520,#2e2013);
    border-radius:3px 7px 7px 3px;
    box-shadow:
      -4px 0 6px rgba(0,0,0,.5) inset,
      6px 10px 20px rgba(0,0,0,.6);
    display:flex;align-items:flex-end;
    overflow:hidden;
    transform:translateY(0) rotate(0);
    transition:transform .35s cubic-bezier(.2,.7,.3,1), box-shadow .35s;
    color:var(--creme);
    text-decoration:none;
    font-family:inherit;
  }
  /* tranche/dos du livre */
  .livre::before{
    content:"";
    position:absolute;left:0;top:0;bottom:0;width:9px;
    background:linear-gradient(90deg, rgba(0,0,0,.55), rgba(255,255,255,.06));
  }
  .livre img{
    position:absolute;inset:0;width:100%;height:100%;
    object-fit:cover;
  }
  /* emplacement (tant qu'il n'y a pas d'image) */
  .placeholder{
    position:absolute;inset:0;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    text-align:center;padding:.8rem;gap:.5rem;
    background:
      radial-gradient(circle at 50% 35%, rgba(201,162,94,.16), transparent 60%),
      linear-gradient(160deg,#463119,#241809);
  }
  .placeholder .titre{
    font-family:'Cormorant Garamond',serif;
    font-size:.98rem;line-height:1.15;
    color:var(--laiton-clair);
  }
  .placeholder .note{
    font-size:.68rem;font-style:italic;color:var(--creme-doux);opacity:.7;
  }
  .livre:hover,.livre:focus-visible{
    transform:translateY(-16px) rotate(-1.2deg);
    box-shadow:-4px 0 6px rgba(0,0,0,.5) inset, 10px 20px 34px rgba(0,0,0,.7);
    outline:none;
  }
  .livre:focus-visible{box-shadow:0 0 0 3px var(--laiton), 10px 20px 34px rgba(0,0,0,.7)}
  /* étiquette dorée qui monte au survol */
  .cartouche{
    position:absolute;left:50%;bottom:-2.4rem;
    transform:translateX(-50%);
    white-space:nowrap;
    font-family:'Cormorant Garamond',serif;
    letter-spacing:.12em;text-transform:uppercase;
    font-size:.72rem;color:var(--laiton-clair);
    opacity:0;transition:opacity .3s, bottom .3s;
    pointer-events:none;
  }
  .livre:hover .cartouche,.livre:focus-visible .cartouche{opacity:1;bottom:-2.9rem}

  footer{
    position:relative;z-index:2;
    text-align:center;
    padding:2rem 1rem 3rem;
    color:var(--creme-doux);
    font-size:.9rem;
  }
  footer a{color:var(--laiton-clair);text-decoration:none;border-bottom:1px solid rgba(201,162,94,.35)}

  @media (max-width:480px){
    .etagere{gap:.7rem;padding:1.1rem .5rem .5rem}
    .armoire{border-width:10px;padding:18px 12px 22px}
  }
  @media (prefers-reduced-motion:reduce){
    .livre{transition:none}
  }
</style>
</head>
<body>

  <header>
    <div class="eyebrow">Roy VAN MIL</div>
    <h1>Auteur</h1>
    <img class="portrait" src="img/roy-auteur.jpg" alt="Roy VAN MIL">
    <p class="sous-titre">Des histoires à ouvrir, des maisons à comprendre, une cloche qui sonne dans la nuit.</p>
  </header>

  <main class="armoire-zone">
    <div class="armoire">
      <div class="fronton">La Bibliothèque</div>
      <div class="etagere">

        <a class="livre" href="cette-maison.html" aria-label="Cette maison, elle vaut vraiment le prix ?">
          <img src="img/couv-cette-maison.jpg" alt="Cette maison, elle vaut vraiment le prix ?">
          <span class="cartouche">Le guide</span>
        </a>

        <a class="livre" href="un-instant.html" aria-label="Un instant, ou Deux…">
          <img src="img/couv-un-instant.png" alt="Un instant, ou Deux…">
          <span class="cartouche">MicroHistoires</span>
        </a>

        <a class="livre" href="la-cloche-des-morts.html" aria-label="La Cloche des Morts">
          <!-- couverture PROVISOIRE — remplacer par la vraie (garder le même nom : couv-cloche.png) -->
          <img src="img/couv-cloche.png" alt="La Cloche des Morts">
          <span class="cartouche">Roman</span>
        </a>

      </div>
    </div>
  </main>

  <footer>
    Écrit et édité par Roy VAN MIL — 32190 Vic-Fezensac, France<br>
    <a href="https://www.instagram.com/royvanmil.auteur/" target="_blank" rel="noopener">Instagram</a>
  </footer>

  <script>
    var API = "https://compteurs.royvanmil86.workers.dev";
    function compte(cle){
      try{ fetch(API + "/compte?c=" + cle, {mode:"cors", keepalive:true}); }catch(e){}
    }
    if(!sessionStorage.getItem("vu-accueil")){
      sessionStorage.setItem("vu-accueil","1");
      compte("accueil");
    }
  </script>

</body>
</html>
